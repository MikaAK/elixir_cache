name: Dialyzer

on:
  push:
    branches: [main]
  pull_request:

jobs:
  Dialyzer:
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test
      IS_CI: true

    steps:
      - uses: actions/checkout@v2

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          version-type: strict
          version-file: .tool-versions

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: |
                _build
                deps
                dialyzer
          key: ${{ runner.os }}-dialyzer-v2-${{ hashFiles('./mix.lock') }}-${{ hashFiles('./.tool-versions') }}
          restore-keys: ${{ runner.os }}-dialyzer-v2-

      - name: Install Dependencies
        run: mix deps.get

      - name: Compile Project
        run: mix compile

      - name: Run Dialyzer
        run: mkdir -p dialyzer && mix dialyzer


